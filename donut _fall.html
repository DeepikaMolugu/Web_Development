<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Donut</title>
  <style>
    body {
      margin: 0;
      height: 50vh;
      background-color: antiquewhite;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
    }

    .donut {
      position: relative;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle at center, #7B3F00 20%, #81490d 60%, #583815 100%);
      border-radius: 50%;
      animation: bounce 2s ease-in-out infinite;
    }

    .donut::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30px;
      height: 30px;
      background-color: antiquewhite;
      border-radius: 50%;
    }

    @keyframes bounce {
      0%   { transform: translateY(-200px); }
      70%  { transform: translateY(300px); }  /* bottom hit */
      85%  { transform: translateY(250px); }  /* small bounce up */
      100% { transform: translateY(300px); }  /* settle */
    }
  </style>
</head>
<body>
  <div class="donut"></div>
</body>
</html>
