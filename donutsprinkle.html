<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Donut</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
        }

        .donut-container {
            position: relative;
            width: 300px;
            height: 300px;
        }

        .donut {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle at center,
                transparent 90px,
                #d4a373 90px
            );
            border-radius: 50%;
            box-shadow:
                0 10px 20px rgba(0, 0, 0, 0.2),
                inset 0 -5px 10px rgba(0, 0, 0, 0.3),
                inset 0 5px 10px rgba(255, 255, 255, 0.2);
        }

        .icing {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 280px;
            height: 280px;
            background: radial-gradient(
                circle at center,
                transparent 80px,
                #ff6b6b 80px
            );
            border-radius: 50%;
            box-shadow:
                0 5px 15px rgba(0, 0, 0, 0.2),
                inset 0 3px 5px rgba(255, 255, 255, 0.5);
            clip-path: polygon(
                0% 0%,
                100% 0%,
                100% 100%,
                0% 100%,
                0% 50%,
                10% 40%,
                20% 60%,
                30% 45%,
                40% 55%,
                50% 40%,
                60% 60%,
                70% 45%,
                80% 55%,
                90% 40%,
                100% 50%
            );
        }

        .sprinkle {
            position: absolute;
            width: 10px;
            height: 3px;
            background: linear-gradient(to right, #fff, #f4f4f4);
            border-radius: 2px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .sprinkle:nth-child(1) {
            top: 50px;
            left: 100px;
            transform: rotate(45deg);
            background: linear-gradient(to right, #ffeb3b, #fbc02d);
        }

        .sprinkle:nth-child(2) {
            top: 80px;
            left: 200px;
            transform: rotate(-30deg);
            background: linear-gradient(to right, #4caf50, #388e3c);
        }

        .sprinkle:nth-child(3) {
            top: 120px;
            left: 70px;
            transform: rotate(60deg);
            background: linear-gradient(to right, #2196f3, #1976d2);
        }

        .sprinkle:nth-child(4) {
            top: 150px;
            left: 220px;
            transform: rotate(-45deg);
            background: linear-gradient(to right, #ff9800, #f57c00);
        }

        .sprinkle:nth-child(5) {
            top: 200px;
            left: 120px;
            transform: rotate(20deg);
            background: linear-gradient(to right, #e91e63, #c2185b);
        }
    </style>
</head>
<body>
    <div class="donut-container">
        <div class="donut">
            <div class="icing">
                <div class="sprinkle"></div>
                <div class="sprinkle"></div>
                <div class="sprinkle"></div>
                <div class="sprinkle"></div>
                <div class="sprinkle"></div>
            </div>
        </div>
    </div>
</body>
</html>
