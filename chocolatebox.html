<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Chocolate Box</title>
  <style>
    body {
      background-color: #fce4ec;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      margin: 0;
    }

    .container {
      position: relative;
    }

    .chocolate-box {
      width: 300px;
      height: 300px;
      background-color: #8B4513;
      border: 10px solid #5D3A00;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-wrap: wrap;
      padding: 15px;
      gap: 10px;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
    }

    .chocolate {
      width: 60px;
      height: 60px;
      background-color: #4B2E2E;
      border-radius: 50%;
      box-shadow: inset 0 0 8px #3b1e1e, 0 2px 5px rgba(0, 0, 0, 0.5);
      position: absolute;
      opacity: 0;
      animation: fillBox 1s forwards;
    }

    .chocolate::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      width: 15px;
      height: 15px;
      background-color: #7B3F00;
      border-radius: 50%;
      box-shadow: 0 0 5px #FFF5;
    }

    @keyframes fillBox {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Positioning chocolates dynamically */
    /* We'll use nth-child to stagger animation and place them */
    .chocolate:nth-child(1)  { top: 20px; left: 20px;  animation-delay: 0.3s; }
    .chocolate:nth-child(2)  { top: 20px; left: 100px; animation-delay: 0.6s; }
    .chocolate:nth-child(3)  { top: 20px; left: 180px; animation-delay: 0.9s; }
    .chocolate:nth-child(4)  { top: 100px; left: 20px; animation-delay: 1.2s; }
    .chocolate:nth-child(5)  { top: 100px; left: 100px; animation-delay: 1.5s; }
    .chocolate:nth-child(6)  { top: 100px; left: 180px; animation-delay: 1.8s; }
    .chocolate:nth-child(7)  { top: 180px; left: 20px; animation-delay: 2.1s; }
    .chocolate:nth-child(8)  { top: 180px; left: 100px; animation-delay: 2.4s; }
    .chocolate:nth-child(9)  { top: 180px; left: 180px; animation-delay: 2.7s; }

    /* Overflowing chocolates */
    .chocolate:nth-child(10) { top: 320px; left: 50px; animation-delay: 3s; }
    .chocolate:nth-child(11) { top: 320px; left: 130px; animation-delay: 3.3s; }
    .chocolate:nth-child(12) { top: 320px; left: 210px; animation-delay: 3.6s; }
  </style>
</head>
<body>
  <div class="container">
    <div class="chocolate-box">
      <div class="chocolate"></div>
      <div class="chocolate"></div>
      <div class="chocolate"></div>
      <div class="chocolate"></div>
      <div class="chocolate"></div>
      <div class="chocolate"></div>
      <div class="chocolate"></div>
      <div class="chocolate"></div>
      <div class="chocolate"></div>
    </div>

    <!-- Overflow chocolates outside the box -->
    <div class="chocolate"></div>
    <div class="chocolate"></div>
    <div class="chocolate"></div>
  </div>
</body>
</html>
