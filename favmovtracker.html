<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Avengers Watchlist</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee+Spice&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Titan+One&display=swap');

        body {
            background-image: url("Avengers.webp");
            margin: 0;
            background-position: center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "Bungee Spice", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .box {
            background: rgba(183, 183, 183, 0.2);
            border-radius: 12px;
            border: 2px solid white;
            padding: 50px;
            height: 400px;
            width: 400px;
            font-family: "Titan One", sans-serif;
            font-weight: 400;
            font-style: normal;
            font-size: x-large;
        }
        .container{
            display:flex;
            flex-direction:column;
            align-items: center;
        }
        h1{
        text-align: center;
          margin-top: 20px;
        }
        ul{
            list-style: none;
            padding:0;
        }
        li{
            display:flex;
            margin:8px 0;
            padding: 6px;
           align-items: center;
            flex-direction: row;
           border-bottom: 1px solid #071b6e;
        }
        li.completed{
            text-decoration:line-through;
            color:rgb(177, 14, 14);
            order:1;
        }
          input[type="checkbox"] {
        margin-right: 10px;
   }
    </style>
</head>

<body>
    <div class="container">
            <h1>Avengers Movie watchlist</h1>
        <div class="box">
        <ul id="watchlist">
             <li><input type="checkbox">The Avengers(2012)</li>   
            <li><input type="checkbox">Avengers:Age Of Ultron(2015)</li>     
            <li><input type="checkbox">Avengers:Infinity War(2018)</li> 
            <li><input type="checkbox">Avengers:End Game(2019)</li>   
        </ul>
        </div>
    </div>
    <script>
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');

checkboxes.forEach(cb => {
  cb.addEventListener('change', function() {
    const li = this.parentElement;
    li.classList.toggle('completed', this.checked);

    if (this.checked) {
      // move the checked item to the bottom of the list
      li.parentElement.appendChild(li);
    }
  });
}); </script>
</body>

</html>
