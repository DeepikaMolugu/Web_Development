<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Donuts Dropping Animation</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #e0dacd; /* light warm background */
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: start;
  }

  .donut {
    position: absolute;
    top: -100px; /* start above viewport */
    width: 80px;
    height: 80px;
    background: radial-gradient(circle at center, #f5a623 25%, #d2691e 60%, #8b4513 90%);
    border-radius: 50%;
    box-shadow: inset -8px -8px 10px #d17a2f, inset 8px 8px 10px #ffcb72;
    animation: drop 4s ease-in forwards ;
  }

  /* The donut hole */
  .donut::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 30px;
    height: 30px;
    background: #f0e6d2;
    border-radius: 50%;
    box-shadow: inset 3px 3px 5px #c1a65f;
  }

  @keyframes drop {
    0% {
      top: -100px;
      transform: rotate(0deg);
      opacity: 1;
    }
    80% {
      top: calc(100vh - 100px);
      transform: rotate(360deg);
      opacity: 1;
    }
    90% {
      transform: rotate(380deg) translateY(-10px);
      opacity: 1;
    }
    100% {
      transform: rotate(360deg) translateY(0);
      opacity: 1;
    }
  }
</style>
</head>
<body>

<div class="donut" style="left: 20%; animation-delay: 0s;"></div>
<div class="donut" style="left: 40%; animation-delay: 1s;"></div>
<div class="donut" style="left: 60%; animation-delay: 2s;"></div>
<div class="donut" style="left: 80%; animation-delay: 3s;"></div>

</body>
</html>
