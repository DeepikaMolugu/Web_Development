<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Variables</title>
    <style>
         .container{
            border-color: 2px solid black;
            background-color: rgb(190, 6, 83);
            width:300px;
            height:150px;
            display:flex;
            justify-content: center;
            align-items: center;
         }
         .childContainer{
            background-color: rgb(52, 42, 165);
            border-color: 2px solid black;
            width:250px;
            display:flex;
            justify-content: center;
            align-items: center;
            height:100px;

         }
         .child{
            border-color:2px solid black;
            background-color: rgb(62, 162, 185);
            width:120px;
            display:flex;
            justify-content: center;
            align-items: center;
            height:25px;
         }
    </style>
</head>
<body>
    <div class="container">
     <div class="childContainer">
    <div class="child"><section>Hey Arjun</section>
    </div></div></div>
    <script>document.querySelector(".container").addEventListener("click",()=>{
    alert("Main container clicked");
})
document.querySelector(".childContainer").addEventListener("click",()=>{
    alert("Child container clicked");
})
document.querySelector(".child").addEventListener("click",()=>{
    alert(" clicked");
})
function getrandomColor(){
    let color="#";
    const char="0123456789ABCDEF";
    for(let i=0;i<6;i++){
       color+=char[Math.floor(Math.random()*16)]
    }
    return color;
}
setInterval(()=>{document.querySelector(".container").style.backgroundColor=getrandomColor();
},1000);
setInterval(()=>{document.querySelector(".child").style.backgroundColor=getrandomColor();
},2000);
setInterval(()=>{document.querySelector(".childContainer").style.backgroundColor=getrandomColor();
},5000);
setInterval(()=>{document.querySelector(".child").innerHTML='SaiRam';
},1000);
setInterval(()=>{document.querySelector(".child").innerHTML='Dudu';
},2000);
setInterval(()=>{document.querySelector(".child").innerHTML='GulabJam';
},3000);
setInterval(()=>{document.querySelector(".child").innerHTML='Motka';
},4000);
setInterval(()=>{document.querySelector(".child").innerHTML='Sweetu';
},5000);
setInterval(()=>{document.querySelector(".child").innerHTML='Panda';
},6000);
setInterval(()=>{document.querySelector(".child").innerHTML='Baby';
},8000);</script>
</body>
</html>
